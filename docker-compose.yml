services:
  api:
    build: .
    container_name: flowershop-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    container_name: flowershop-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis: # Thêm service redis
    image: redis:alpine
    container_name: flowershop-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
              mongo_data:
              redis_data: